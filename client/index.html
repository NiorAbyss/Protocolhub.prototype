<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ════════════════════════════════════════════
         PRIMARY SEO
    ════════════════════════════════════════════ -->
    <title>ProtocolHub — Solana NFT Intelligence Platform</title>
    <meta name="description" content="ProtocolHub is a professional-grade, NFT-gated crypto intelligence platform built on Solana. Real-time DEX flows, whale tracking, AI signals, protocol audits, and on-chain analytics — for serious market participants only." />
    <meta name="keywords" content="Solana, NFT, crypto intelligence, DEX analytics, whale tracker, on-chain data, DeFi, ProtocolHub, PGEN, Protocol Genesis, token sniper, smart money" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ProtocolHub" />
    <link rel="canonical" href="https://protocolhub.site" />

    <!-- ════════════════════════════════════════════
         OPEN GRAPH — Google rich preview + social
    ════════════════════════════════════════════ -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://protocolhub.site" />
    <meta property="og:site_name"    content="ProtocolHub" />
    <meta property="og:title"        content="ProtocolHub — Solana NFT Intelligence Platform" />
    <meta property="og:description"  content="NFT-gated crypto intelligence for serious market participants. Real-time DEX flows, whale tracking, AI signals, and on-chain analytics — Protocol Genesis holders only." />
    <meta property="og:image"        content="https://protocolhub.site/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="ProtocolHub — The Vast Network" />
    <meta property="og:locale"       content="en_US" />

    <!-- ════════════════════════════════════════════
         TWITTER / X CARD
    ════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ProtocolHub — Solana NFT Intelligence Platform" />
    <meta name="twitter:description" content="NFT-gated crypto intelligence for serious market participants. Real-time DEX flows, whale tracking, AI signals, and on-chain analytics." />
    <meta name="twitter:image"       content="https://protocolhub.site/og-image.png" />

    <!-- ════════════════════════════════════════════
         BROWSER / PWA BRANDING
    ════════════════════════════════════════════ -->
    <meta name="theme-color"         content="#00b4ff" />
    <meta name="application-name"    content="ProtocolHub" />
    <link rel="icon"              type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon"              type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon"  sizes="180x180"               href="/apple-touch-icon.png" />
    <link rel="manifest"                                         href="/site.webmanifest" />

    <!-- ════════════════════════════════════════════
         STRUCTURED DATA — JSON-LD
         Helps Google show rich results & sitelinks
    ════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ProtocolHub",
      "alternateName": "ProtocolHub — The Vast Network",
      "url": "https://protocolhub.site",
      "description": "ProtocolHub is a professional-grade, NFT-gated crypto intelligence platform built on Solana. It brings together real-time blockchain data, market analytics, and AI-powered signals into one terminal-style interface.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "image": "https://protocolhub.site/og-image.png",
      "offers": {
        "@type": "Offer",
        "description": "Access via Protocol Genesis NFT. Pioneer Tier: $40 USDC (first 2,000 members). Standard: $70 USDC.",
        "priceCurrency": "USD",
        "price": "40"
      },
      "featureList": [
        "Real-time DEX flow monitoring",
        "Whale tracker with buy/sell pressure",
        "AI-powered token signals (BUY/SELL/NEUTRAL)",
        "Contract audit and rug detection",
        "Token launch sniper",
        "Smart money wallet tracking",
        "Solana network health dashboard",
        "Protocol TVL rankings",
        "Staking yield comparisons",
        "Aggregated crypto news feed"
      ]
    }
    </script>
